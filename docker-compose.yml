services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      RIOT_API_KEY: ${RIOT_API_KEY:?set RIOT_API_KEY in your .env}
      DEFAULT_REGION: ${DEFAULT_REGION:-na1}
      PORT: 4000
      # Allow the browser app to call the API. In prod set to https://ryot.lol.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # Set true when the API sits behind a reverse proxy / Cloudflare so the
      # rate limiter reads the real client IP from X-Forwarded-For.
      TRUST_PROXY: ${TRUST_PROXY:-false}
      # Ryot build/meta engine. Off until a production Riot key is in place;
      # while off, build/tier/meta endpoints report "coming soon".
      STATS_CRAWL_ENABLED: ${STATS_CRAWL_ENABLED:-false}
      STATS_CRAWL_PLATFORMS: ${STATS_CRAWL_PLATFORMS:-na1,euw1,kr}
      STATS_CRAWL_SCOPE: ${STATS_CRAWL_SCOPE:-apex}
      STATS_MATCHES_PER_PLAYER: ${STATS_MATCHES_PER_PLAYER:-15}
      STATS_CYCLE_INTERVAL_MIN: ${STATS_CYCLE_INTERVAL_MIN:-360}
      STATS_SNAPSHOT_PATH: ${STATS_SNAPSHOT_PATH:-data/stats-snapshot.json.gz}
    ports:
      - "4000:4000"
    # Persist the aggregated build/meta snapshot across restarts.
    volumes:
      - stats-data:/app/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # Baked into the browser bundle: the URL the browser hits the API at.
        # In prod set to https://api.ryot.lol.
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:4000}
        # Public canonical site URL (SEO/OG). In prod set to https://ryot.lol.
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://ryot.lol}
        # Set NEXT_PUBLIC_COMING_SOON=true in your .env to hide download buttons.
        NEXT_PUBLIC_COMING_SOON: ${NEXT_PUBLIC_COMING_SOON:-false}
    environment:
      # Used for server-side rendering inside the container network.
      API_BASE: http://server:4000
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  stats-data:
