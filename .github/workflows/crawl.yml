name: Crawl u.gg dataset

# Scrapes u.gg from GitHub's clean IP once a week and publishes the result as a
# release asset (tag "dataset"). The server downloads it via uggDataset.ts, so
# builds/tier/meta keep working even when the self-host's IP is blocked by u.gg.
#
# First-time setup: after merging, run this workflow once manually (Actions tab ->
# "Crawl u.gg dataset" -> "Run workflow") to create the initial "dataset" release.

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch: {}

# Allow the job to create/update the "dataset" release.
permissions:
  contents: write

concurrency:
  group: crawl-ugg
  cancel-in-progress: false

jobs:
  crawl:
    name: Crawl and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Only the server package is needed (the crawler is standalone and runs
      # with its tsx devDependency).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @lc/server...

      - name: Crawl u.gg
        run: pnpm --filter @lc/server exec tsx scripts/crawl.ts

      - name: Show dataset metadata
        run: cat apps/server/data/ugg-dataset.meta.json

      - name: Publish dataset release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view dataset >/dev/null 2>&1 \
            || gh release create dataset \
                 --title "u.gg dataset" \
                 --notes "Weekly pre-crawled u.gg dataset consumed by the server (apps/server/src/uggDataset.ts). Auto-updated by CI; do not edit by hand."
          gh release upload dataset apps/server/data/ugg-dataset.json.gz --clobber
